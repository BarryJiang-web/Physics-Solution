    <script>
        // ======================== 数据层 ============================
        const DEFAULT_DATA = {
            questions: [
                {
                    id: '1_1',
                    chapter: 1,
                    title: '问题1.1 - 柯西积分公式',
                    desc: '利用柯西积分公式计算积分：\n\\[ \\oint_C \\frac{e^z}{z^2 + 1} dz \\]\n其中C是正向圆周 \\( |z| = 2 \\)。',
                    source: '复变函数教材',
                    ans: '步骤1：确定被积函数的奇点：\n\\[ z^2 + 1 = 0 \\Rightarrow z = \\pm i \\]\n这两个奇点都在圆周 \\( |z| = 2 \\) 内。\n\n步骤2：应用柯西积分公式：\n\\[ \\oint_C \\frac{e^z}{z^2 + 1} dz = \\oint_C \\frac{e^z}{(z-i)(z+i)} dz \\]\n\n步骤3：计算留数：\n\\[ \\text{Res}(f, i) = \\frac{e^i}{2i}, \\quad \\text{Res}(f, -i) = \\frac{e^{-i}}{-2i} \\]\n\n步骤4：应用留数定理：\n\\[ \\oint_C = 2\\pi i \\left(\\frac{e^i}{2i} + \\frac{e^{-i}}{-2i}\\right) = \\pi(e^i - e^{-i}) = 2\\pi i \\sin(1) \\]'
                },
                {
                    id: '2_1',
                    chapter: 2,
                    title: '问题2.1 - 傅里叶变换',
                    desc: '计算高斯函数 \\( f(x) = e^{-ax^2} \\) (a > 0) 的傅里叶变换。',
                    source: '积分变换教材',
                    ans: '步骤1：傅里叶变换定义：\n\\[ \\hat{f}(k) = \\int_{-\\infty}^\\infty e^{-ikx} e^{-ax^2} dx \\]\n\n步骤2：配方：\n\\[ -ax^2 - ikx = -a\\left(x + \\frac{ik}{2a}\\right)^2 - \\frac{k^2}{4a} \\]\n\n步骤3：变量替换并积分：\n\\[ \\hat{f}(k) = e^{-\\frac{k^2}{4a}} \\int_{-\\infty}^\\infty e^{-a(x + \\frac{ik}{2a})^2} dx = \\sqrt{\\frac{\\pi}{a}} e^{-\\frac{k^2}{4a}} \\]'
                },
                {
                    id: '2_2',
                    chapter: 2,
                    title: '问题2.2 - 拉普拉斯变换',
                    desc: '计算 \\( f(t) = t^n \\) 的拉普拉斯变换。',
                    source: '积分变换教材',
                    ans: '步骤1：拉普拉斯变换定义：\n\\[ F(s) = \\int_0^\\infty t^n e^{-st} dt \\]\n\n步骤2：令 \\( u = st \\)，则 \\( t = u/s \\)，\\( dt = du/s \\)：\n\\[ F(s) = \\int_0^\\infty (u/s)^n e^{-u} \\frac{du}{s} = \\frac{1}{s^{n+1}} \\int_0^\\infty u^n e^{-u} du \\]\n\n步骤3：使用伽马函数 \\( \\Gamma(n+1) = n! \\)：\n\\[ F(s) = \\frac{\\Gamma(n+1)}{s^{n+1}} = \\frac{n!}{s^{n+1}} \\]'
                }
            ],
            resources: [
                {
                    id: 'r1',
                    name: '蒋泊远笔记',
                    desc: '经典数学物理笔记',
                    file: '../物理系教材解答网站尝试/source/mathphysics/数学物理方法.pdf'
                },
                {
                    id: 'r2',
                    name: '顾樵《数学物理方法》',
                    desc: '中文经典教材',
                    file: '../物理系教材解答网站尝试/source/mathphysics/数学物理方法 by 顾樵 (z-lib.org).pdf'
                },
                {
                    id: 'r3',
                    name: '数学物理方程及其近似方法',
                    desc: '程建春',
                    file: '../物理系教材解答网站尝试/source/mathphysics/[现代物理基础丛书]3 数学物理方程及其近似方法 程建春 2004.5 461s.pdf'
                },
                {
                    id: 'r4',
                    name: '数学物理方法',
                    desc: '汪德新',
                    file: '../物理系教材解答网站尝试/source/mathphysics/数学物理方法 汪德新.pdf'
                },
                {
                    id: 'r5',
                    name: '数学物理方法补充',
                    desc: '中文经典教材',
                    file: '../物理系教材解答网站尝试/source/mathphysics/数学物理方法补充.pdf'
                }
            ]
        };

        const STORAGE_KEY = 'mathphy_questions_data';
        let devModeActive = false;

        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (parsed && Array.isArray(parsed.questions) && Array.isArray(parsed.resources)) {
                        return parsed;
                    }
                } catch (e) {}
            }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_DATA));
            return JSON.parse(JSON.stringify(DEFAULT_DATA));
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        let appData = loadData();

        // ======================== 渲染引擎 ============================
        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function parseTextToHTML(text, type) {
            const trimmed = text.trim();
            if (type === 'title') return trimmed;
            if (type === 'source') {
                if (!trimmed) return '';
                return `<div class="alert alert-info mt-2 mb-0">来源: ${trimmed}</div>`;
            }
            const blocks = trimmed.split(/\n\s*\n/);
            let finalHTML = '';
            blocks.forEach(block => {
                if (!block.trim()) return;
                const formattedBlock = block.replace(/\n/g, '<br>');
                if (type === 'desc') {
                    finalHTML += `<p>${formattedBlock}</p>`;
                } else if (type === 'ans') {
                    finalHTML += `<div class="solution-step"><p>${formattedBlock}</p></div>`;
                }
            });
            return finalHTML || trimmed;
        }

        function renderChapter(chapterNum) {
            const container = document.querySelector(`.chapter-container#chapter${chapterNum} .question-list`);
            if (!container) return;
            const chapterQuestions = appData.questions.filter(q => q.chapter === chapterNum);
            chapterQuestions.sort((a, b) => a.id.localeCompare(b.id));
            
            let html = '';
            chapterQuestions.forEach(q => {
                const uid = q.id;
                const titleHtml = parseTextToHTML(q.title, 'title');
                const descHtml = parseTextToHTML(q.desc, 'desc');
                const sourceHtml = parseTextToHTML(q.source, 'source');
                const ansHtml = parseTextToHTML(q.ans, 'ans');

                html += `
                <div class="card mb-4 editable-card chapter-card" id="q_${uid}">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <h4 class="problem-title mb-0 fw-bold editable-content" id="title_${uid}" data-type="title" data-raw="${escapeHtml(q.title)}">${titleHtml}</h4>
                            <div>
                                <button class="btn btn-sm btn-outline-danger dev-tool dev-edit-btn" onclick="toggleEdit('title_${uid}')">编辑</button>
                                <button class="btn btn-sm btn-outline-danger dev-tool dev-delete-btn" onclick="deleteQuestion('${uid}')">删除</button>
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="fw-bold mb-0 text-secondary">题目描述</h5>
                                <button class="btn btn-sm btn-outline-danger dev-tool dev-edit-btn" onclick="toggleEdit('desc_${uid}')">编辑</button>
                            </div>
                            <div class="editable-content" id="desc_${uid}" data-type="desc" data-raw="${escapeHtml(q.desc)}">${descHtml}</div>
                        </div>

                        <div class="mb-4">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="fw-bold mb-0 text-secondary">来源出处</h5>
                                <button class="btn btn-sm btn-outline-danger dev-tool dev-edit-btn" onclick="toggleEdit('source_${uid}')">编辑</button>
                            </div>
                            <div class="editable-content" id="source_${uid}" data-type="source" data-raw="${escapeHtml(q.source)}">${sourceHtml}</div>
                        </div>

                        <div class="mb-2">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="fw-bold mb-0 text-secondary">解答</h5>
                                <button class="btn btn-sm btn-outline-danger dev-tool dev-edit-btn" onclick="toggleEdit('ans_${uid}')">编辑</button>
                            </div>
                            <div class="editable-content" id="ans_${uid}" data-type="ans" data-raw="${escapeHtml(q.ans)}">${ansHtml}</div>
                        </div>
                    </div>
                </div>
                `;
            });
            container.innerHTML = html;

            // 更新题目计数
            const countBadge = document.getElementById(`count_${chapterNum}`);
            if (countBadge) {
                countBadge.textContent = `${chapterQuestions.length}题`;
            }

            document.querySelectorAll('.dev-tool').forEach(el => {
                el.style.display = devModeActive ? 'inline-block' : 'none';
            });

            if (window.MathJax && container.querySelectorAll('.editable-content').length) {
                MathJax.typesetPromise([container]).catch(err => console.error('MathJax渲染错误', err));
            }
        }

        function renderResources() {
            const container = document.getElementById('resourceList');
            if (!container) return;
            let html = '';
            appData.resources.forEach(r => {
                html += `
                <div class="resource-item" id="res_${r.id}">
                    <div class="d-flex justify-content-between align-items-center">
                        <a href="${r.file}" target="_blank" class="d-flex align-items-center flex-grow-1">
                            <span>${escapeHtml(r.name)}</span>
                        </a>
                        <button class="btn btn-sm btn-outline-danger dev-tool" onclick="deleteResource('${r.id}')" style="display:none;">
                            ×
                        </button>
                    </div>
                    <small class="text-muted d-block mt-1">${escapeHtml(r.desc)}</small>
                </div>
                `;
            });
            html += `
                <div class="text-center mt-3">
                    <button class="btn btn-sm btn-outline-primary dev-tool" onclick="showAddResourceModal()" style="display:none;">
                        上传资料
                    </button>
                    <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#uploadModal">
                        上传资料
                    </button>
                </div>
            `;
            container.innerHTML = html;

            document.querySelectorAll('.dev-tool').forEach(el => {
                el.style.display = devModeActive ? 'inline-block' : 'none';
            });
        }

        function renderAll() {
            renderChapter(1);
            renderChapter(2);
            renderChapter(3);
            renderChapter(4);
            renderChapter(5);
            renderResources();
            document.getElementById('devModeSwitch').checked = devModeActive;
            document.querySelectorAll('.dev-tool').forEach(el => {
                el.style.display = devModeActive ? 'inline-block' : 'none';
            });
        }

        // ======================== 搜索功能 ============================
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase().trim();
            const allCards = document.querySelectorAll('.editable-card');
            allCards.forEach(card => {
                const contentElements = card.querySelectorAll('.editable-content');
                let isMatch = false;
                contentElements.forEach(el => {
                    const text = (el.getAttribute('data-raw') || el.innerText || "").toLowerCase();
                    if (text.includes(keyword)) isMatch = true;
                });
                card.style.display = isMatch ? '' : 'none';
            });
            document.querySelectorAll('.chapter-container').forEach(chapter => {
                const cards = chapter.querySelectorAll('.editable-card');
                let hasVisible = false;
                cards.forEach(c => { if (c.style.display !== 'none') hasVisible = true; });
                chapter.style.display = (keyword !== '' && !hasVisible) ? 'none' : '';
            });
        });

        // ======================== ScrollSpy 滚动监听 ============================
        function setupScrollSpy() {
            const options = { root: null, rootMargin: '-20% 0px -60% 0px', threshold: 0 };
            const scrollObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const chapterId = entry.target.id;
                        document.querySelectorAll('#chapterNavbar .list-group-item').forEach(btn => btn.classList.remove('active'));
                        const targetBtn = document.querySelector(`#chapterNavbar a[href="#${chapterId}"]`);
                        if(targetBtn) targetBtn.classList.add('active');
                    }
                });
            }, options);
            document.querySelectorAll('.chapter-container').forEach(chapter => scrollObserver.observe(chapter));
        }

        // ======================== 阅读进度条、返回顶部 ============================
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("readingProgress").style.width = scrolled + "%";

            const backToTopBtn = document.getElementById("backToTop");
            if (winScroll > 300) { backToTopBtn.classList.add("show"); } 
            else { backToTopBtn.classList.remove("show"); }
        };
        document.getElementById("backToTop").onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

        // ======================== 沉浸模式 ============================
        const focusBtn = document.getElementById('focusToggle');
        focusBtn.addEventListener('click', () => {
            document.body.classList.toggle('focus-mode');
            const icon = focusBtn.querySelector('i');
            if(document.body.classList.contains('focus-mode')) {
                icon.className = 'fas fa-compress'; focusBtn.title = '退出专注模式';
            } else {
                icon.className = 'fas fa-expand'; focusBtn.title = '沉浸/授课模式';
            }
        });

        // ======================== 夜间模式 ============================
        const themeBtn = document.getElementById('themeToggle');
        themeBtn.addEventListener('click', () => {
            const htmlTag = document.documentElement;
            const currentTheme = htmlTag.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            htmlTag.setAttribute('data-bs-theme', newTheme);
            themeBtn.innerHTML = newTheme === 'dark' ? '<i class="fas fa-sun text-warning"></i>' : '<i class="fas fa-moon"></i>';
        });

        // ======================== 编辑与删除 ============================
        function toggleEdit(elementId) {
            if (!devModeActive) return;
            const contentDiv = document.getElementById(elementId);
            if (!contentDiv) return;
            const btn = contentDiv.parentElement.querySelector('.dev-edit-btn') || 
                        contentDiv.previousElementSibling?.querySelector('.dev-edit-btn');
            const type = contentDiv.getAttribute('data-type');
            const raw = contentDiv.getAttribute('data-raw') || '';

            if (contentDiv.tagName.toLowerCase() !== 'textarea') {
                const textarea = document.createElement('textarea');
                textarea.id = elementId;
                textarea.className = 'form-control editable-content mb-2';
                textarea.setAttribute('data-type', type);
                textarea.rows = (type === 'title' || type === 'source') ? 2 : 8;
                textarea.value = raw;
                contentDiv.replaceWith(textarea);
                if (btn) {
                    btn.innerHTML = '保存';
                    btn.classList.remove('btn-outline-danger');
                    btn.classList.add('btn-success');
                }
            } else {
                const currentText = contentDiv.value;
                const id = elementId.split('_').slice(1).join('_');
                const typeKey = elementId.split('_')[0];
                const q = appData.questions.find(q => q.id === id);
                if (q) {
                    if (typeKey === 'title') q.title = currentText;
                    else if (typeKey === 'desc') q.desc = currentText;
                    else if (typeKey === 'source') q.source = currentText;
                    else if (typeKey === 'ans') q.ans = currentText;
                    saveData(appData);
                }
                const newDiv = document.createElement('div');
                newDiv.id = elementId;
                newDiv.className = 'editable-content';
                newDiv.setAttribute('data-type', type);
                newDiv.setAttribute('data-raw', currentText);
                if (type === 'title') newDiv.classList.add('problem-title', 'mb-4', 'fw-bold');
                newDiv.innerHTML = parseTextToHTML(currentText, type);
                contentDiv.replaceWith(newDiv);
                if (btn) {
                    btn.innerHTML = '编辑';
                    btn.classList.remove('btn-success');
                    btn.classList.add('btn-outline-danger');
                }
                if (window.MathJax) {
                    MathJax.typesetPromise([newDiv]).catch(err => console.error('MathJax渲染错误', err));
                }
            }
        }

        function deleteQuestion(uid) {
            if (!devModeActive) return;
            if (!confirm(`确定要删除题目 "${uid}" 吗？此操作不可撤销。`)) return;
            appData.questions = appData.questions.filter(q => q.id !== uid);
            saveData(appData);
            renderAll();
        }

        function addNewQuestion(chapterId) {
            if (!devModeActive) return;
            const chapterNum = parseInt(chapterId.replace('chapter', ''));
            const maxId = appData.questions
                .filter(q => q.chapter === chapterNum)
                .reduce((max, q) => {
                    const num = parseInt(q.id.split('_')[1]);
                    return num > max ? num : max;
                }, 0);
            const newId = `${chapterNum}_${maxId + 1}`;
            
            const newQ = {
                id: newId,
                chapter: chapterNum,
                title: '新题目名称',
                desc: '请在此直接输入题目文本及 LaTeX 公式，双换行（留一个空行）可以分段。',
                source: '未指定参考书籍',
                ans: '步骤1：输入内容。\n\n步骤2：空行后输入第二步公式：\\[ \\nabla \\cdot \\mathbf{E} = 0 \\]'
            };
            appData.questions.push(newQ);
            saveData(appData);
            renderAll();
        }

        // ======================== 资源管理 ============================
        function deleteResource(rid) {
            if (!devModeActive) return;
            if (!confirm(`确定要删除资料 "${appData.resources.find(r => r.id === rid)?.name}" 吗？`)) return;
            appData.resources = appData.resources.filter(r => r.id !== rid);
            saveData(appData);
            renderResources();
        }

        function showAddResourceModal() {
            if (!devModeActive) return;
            const name = prompt('请输入资料名称：');
            if (!name) return;
            const desc = prompt('请输入简要描述：');
            const file = prompt('请输入文件路径（如：pdfs/example.pdf）：');
            if (!file) return;
            const newRes = {
                id: 'r' + Date.now(),
                name: name,
                desc: desc || '无描述',
                file: file
            };
            appData.resources.push(newRes);
            saveData(appData);
            renderResources();
        }

        function addResource() {
            showAddResourceModal();
        }

        // ======================== 开发者认证 ============================
        let passwordVisible = false;
        function togglePasswordVisibility() {
            const pwdInput = document.getElementById('devPassword');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordVisible) {
                pwdInput.type = 'password';
                eyeIcon.className = 'fas fa-eye';
                passwordVisible = false;
            } else {
                pwdInput.type = 'text';
                eyeIcon.className = 'fas fa-eye-slash';
                passwordVisible = true;
            }
        }

        function openDevAuth() {
            document.getElementById('devAuthOverlay').classList.add('active');
            document.getElementById('authError').style.display = 'none';
            document.getElementById('devAccount').value = '';
            document.getElementById('devPassword').value = '';
            if (passwordVisible) {
                togglePasswordVisibility();
            }
            setTimeout(() => document.getElementById('devAccount').focus(), 100);
        }

        function closeDevAuth() {
            document.getElementById('devAuthOverlay').classList.remove('active');
            if (!devModeActive) {
                document.getElementById('devModeSwitch').checked = false;
            }
        }

        function verifyDevAuth() {
            const account = document.getElementById('devAccount').value.trim();
            const password = document.getElementById('devPassword').value.trim();
            if (account === '2511392' && password === 'Jby021009') {
                devModeActive = true;
                document.getElementById('devAuthOverlay').classList.remove('active');
                document.getElementById('devModeSwitch').checked = true;
                document.querySelectorAll('.dev-tool').forEach(el => {
                    el.style.display = 'inline-block';
                });
                sessionStorage.setItem('dev_authenticated_mathphy', 'true');
                document.getElementById('devPassword').value = '';
            } else {
                document.getElementById('authError').style.display = 'block';
                document.getElementById('devPassword').value = '';
                document.getElementById('devPassword').focus();
            }
        }

        document.getElementById('devPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                verifyDevAuth();
            }
        });
        document.getElementById('devAccount').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('devPassword').focus();
            }
        });

        document.getElementById('devAuthOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDevAuth();
            }
        });

        // ======================== 开发者模式开关 ============================
        document.getElementById('devModeSwitch').addEventListener('change', function(e) {
            if (e.target.checked) {
                if (devModeActive) {
                    document.querySelectorAll('.dev-tool').forEach(el => {
                        el.style.display = 'inline-block';
                    });
                    return;
                }
                openDevAuth();
                if (!devModeActive) {
                    this.checked = false;
                }
            } else {
                devModeActive = false;
                document.querySelectorAll('.dev-tool').forEach(el => {
                    el.style.display = 'none';
                });
                sessionStorage.removeItem('dev_authenticated_mathphy');
            }
        });

        // ======================== 导航 ============================
        document.querySelectorAll('#chapterNavbar .list-group-item').forEach(item => {
            item.addEventListener('click', function(e) {
                document.querySelectorAll('#chapterNavbar .list-group-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // ======================== 上传功能 ============================
        document.getElementById('submitUpload')?.addEventListener('click', function() {
            const resourceName = document.getElementById('resourceName').value;
            const fileInput = document.getElementById('resourceFile');
            
            if(resourceName && fileInput.files.length > 0) {
                alert(`文件 ${fileInput.files[0].name} 上传成功！`);
                var bootstrapModal = bootstrap.Modal.getInstance(document.getElementById('uploadModal'));
                bootstrapModal.hide();
            } else {
                alert('请填写完整信息并选择文件！');
            }
        });

        // ======================== 启动 ============================
        document.addEventListener('DOMContentLoaded', function() {
            if (sessionStorage.getItem('dev_authenticated_mathphy') === 'true') {
                devModeActive = true;
            }
            renderAll();
            setupScrollSpy();
            if (devModeActive) {
                document.getElementById('devModeSwitch').checked = true;
                document.querySelectorAll('.dev-tool').forEach(el => {
                    el.style.display = 'inline-block';
                });
            } else {
                document.getElementById('devModeSwitch').checked = false;
                document.querySelectorAll('.dev-tool').forEach(el => {
                    el.style.display = 'none';
                });
            }
        });

        // 暴露全局函数
        window.toggleEdit = toggleEdit;
        window.addNewQuestion = addNewQuestion;
        window.deleteQuestion = deleteQuestion;
        window.deleteResource = deleteResource;
        window.addResource = addResource;
        window.showAddResourceModal = showAddResourceModal;
        window.openDevAuth = openDevAuth;
        window.closeDevAuth = closeDevAuth;
        window.verifyDevAuth = verifyDevAuth;
        window.togglePasswordVisibility = togglePasswordVisibility;
    </script>
</body>
</html>
