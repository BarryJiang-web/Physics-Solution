<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宇宙学 | PhysicsSolution Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --cosmo-purple: #6a11cb;
            --cosmo-blue: #2575fc;
            --physics-blue: #2b5fdc;
        }
        .cosmo-header {
            background: linear-gradient(135deg, var(--cosmo-purple) 0%, var(--cosmo-blue) 100%);
            color: white;
        }
        .chapter-card {
            border-left: 4px solid var(--cosmo-purple);
            transition: all 0.3s;
        }
        .chapter-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(106, 17, 203, 0.1);
        }
        .problem-title {
            color: var(--cosmo-purple);
            border-bottom: 2px solid var(--cosmo-purple);
        }
        .nav-pills .nav-link.active {
            background-color: var(--cosmo-purple);
        }
        .book-cover {
            max-height: 250px;
            width: auto;
            object-fit: contain;
            padding: 15px;
            background: #fff;
        }
        .solution-step {
            margin-bottom: 15px;
            padding-left: 15px;
            border-left: 3px solid var(--cosmo-purple);
        }
        .resource-item {
            border-left: 3px solid var(--physics-blue);
            padding: 10px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        .resource-item:hover {
            background-color: #f8f9fa;
        }
        .resource-item a {
            color: #333;
            text-decoration: none;
        }
        .resource-item a:hover {
            color: var(--physics-blue);
        }
        @media (max-width: 768px) {
            .book-cover {
                max-width: 100%;
                height: auto;
            }
        }
        textarea.editable-content {
            font-family: 'Courier New', Courier, monospace;
            background-color: #fdfdfd;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .dev-edit-btn {
            padding: 0.2rem 0.5rem;
            font-size: 0.8rem;
        }
        .dev-delete-btn {
            padding: 0.2rem 0.5rem;
            font-size: 0.8rem;
            margin-left: 4px;
        }
        .sidebar-sticky {
            position: sticky;
            top: 20px;
            z-index: 100;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }
        .sidebar-sticky::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar-sticky::-webkit-scrollbar-thumb {
            background-color: rgba(0,0,0,0.1);
            border-radius: 4px;
        }
        .sidebar-sticky::-webkit-scrollbar-track {
            background: transparent;
        }
        .dev-tool {
            display: none;
        }
        /* 认证弹窗 */
        .auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .auth-overlay.active {
            display: flex;
        }
        .auth-modal {
            background: #fff;
            border-radius: 16px;
            padding: 2rem;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .auth-modal .form-label {
            font-weight: 600;
        }
        .auth-modal .btn-primary {
            background: var(--cosmo-purple);
            border: none;
        }
        .auth-modal .btn-primary:hover {
            background: #5a0fb5;
        }
        .auth-error {
            color: #dc3545;
            font-size: 0.9rem;
            margin-top: 8px;
            display: none;
        }
        #authButtons {
            display: none !important;
        }
        /* 密码输入框切换显示 */
        .password-toggle {
            position: relative;
        }
        .password-toggle .toggle-eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6c757d;
            background: none;
            border: none;
            padding: 0;
            z-index: 5;
        }
        .password-toggle .toggle-eye:hover {
            color: #333;
        }
    </style>
</head>
<body>
    <!-- 开发者认证弹窗 -->
    <div class="auth-overlay" id="devAuthOverlay">
        <div class="auth-modal">
            <h4 class="mb-3"><i class="fas fa-shield-alt me-2" style="color: var(--cosmo-purple);"></i>开发者验证</h4>
            <p class="text-muted small">请输入账号与密码以启用开发者模式</p>
            <div class="mb-3">
                <label class="form-label">账号</label>
                <input type="text" class="form-control" id="devAccount" placeholder="请输入账号">
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <div class="password-toggle">
                    <input type="password" class="form-control" id="devPassword" placeholder="请输入密码">
                    <button class="toggle-eye" type="button" onclick="togglePasswordVisibility()" tabindex="-1">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>
            <div class="auth-error" id="authError">账号或密码错误，请重试。</div>
            <div class="d-flex justify-content-end gap-2">
                <button class="btn btn-secondary" onclick="closeDevAuth()">取消</button>
                <button class="btn btn-primary" onclick="verifyDevAuth()"><i class="fas fa-unlock me-1"></i> 验证并开启</button>
            </div>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-atom me-2"></i>PhysicsSolution Hub
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html"><i class="fas fa-home me-1"></i> 首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="cosmos.html"><i class="fas fa-star me-1"></i> 宇宙学</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <div class="form-check form-switch me-4 d-flex align-items-center" id="devModeSwitchContainer">
                        <input class="form-check-input me-2" type="checkbox" id="devModeSwitch">
                        <label class="form-check-label text-danger fw-bold" for="devModeSwitch" style="cursor: pointer;"><i class="fas fa-code"></i> 开发者模式</label>
                    </div>
                    <div id="authButtons"></div>
                </div>
            </div>
        </div>
    </nav>

    <header class="cosmo-header py-5 mb-5">
        <div class="container text-center">
            <h1 class="display-4 fw-bold">
                <i class="fas fa-star-and-crescent me-2"></i>宇宙学解答库
            </h1>
            <p class="lead mb-0">涵盖宇宙学基础、FRW度规、宇宙热历史等核心内容</p>
        </div>
    </header>

    <div class="container">
        <div class="row">
            <div class="col-lg-3 mb-4">
                <div class="sidebar-sticky">
                    
                    <div class="card shadow-sm mb-4">
                        <div class="card-body">
                            <h5 class="card-title mb-3"><i class="fas fa-search me-2"></i>搜索题目</h5>
                            <div class="input-group">
                                <input type="text" id="searchInput" class="form-control" placeholder="输入关键词 (如：哈勃)...">
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-white">
                            <h5 class="mb-0"><i class="fas fa-list-ul me-2"></i>章节导航</h5>
                        </div>
                        <div class="list-group list-group-flush" id="chapterNavbar">
                            <a href="#chapter1" class="list-group-item list-group-item-action active">1. 宇宙学基础</a>
                            <a href="#chapter2" class="list-group-item list-group-item-action">2. FRW度规</a>
                            <a href="#chapter3" class="list-group-item list-group-item-action">3. 宇宙热历史</a>
                            <a href="#chapter4" class="list-group-item list-group-item-action">4. 暴胀理论</a>
                        </div>
                    </div>

                    <div class="card shadow-sm">
                        <div class="card-header bg-white">
                            <h5 class="mb-0"><i class="fas fa-book me-2"></i>推荐教材</h5>
                        </div>
                        <div class="card-body text-center">
                            <img src="cosmos.jpeg" alt="宇宙学的物理基础" class="img-fluid book-cover mb-3">
                            <h6>宇宙学的物理基础</h6>
                            <p class="text-muted small mb-0">Steven Weinberg</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-9">
                <!-- 章节1 -->
                <div class="mb-5 chapter-container" id="chapter1">
                    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                        <h2 class="h3 mb-0 text-dark fw-bold">
                            <i class="fas fa-globe me-2 text-primary"></i>第一章：宇宙学基础
                        </h2>
                        <span class="badge rounded-pill" style="background-color: var(--cosmo-purple);">哈勃与密度</span>
                    </div>
                    <div class="question-list" data-chapter="1"></div>
                    <button class="btn btn-outline-primary w-100 mt-2 dev-tool add-q-btn" onclick="addNewQuestion('chapter1')" style="display: none;">
                        <i class="fas fa-plus mr-1"></i> 在第一章添加新题目
                    </button>
                </div>

                <!-- 章节2 -->
                <div class="mb-5 chapter-container" id="chapter2">
                    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                        <h2 class="h3 mb-0 text-dark fw-bold">
                            <i class="fas fa-ruler-combined me-2 text-primary"></i>第二章：FRW度规
                        </h2>
                        <span class="badge rounded-pill" style="background-color: var(--cosmo-purple);">度规与场方程</span>
                    </div>
                    <div class="question-list" data-chapter="2"></div>
                    <button class="btn btn-outline-primary w-100 mt-2 dev-tool add-q-btn" onclick="addNewQuestion('chapter2')" style="display: none;">
                        <i class="fas fa-plus mr-1"></i> 在第二章添加新题目
                    </button>
                </div>

                <!-- 章节3 -->
                <div class="mb-5 chapter-container" id="chapter3">
                    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                        <h2 class="h3 mb-0 text-dark fw-bold"><i class="fas fa-fire me-2 text-primary"></i>3. 宇宙热历史</h2>
                    </div>
                    <div class="question-list" data-chapter="3"></div>
                    <button class="btn btn-outline-primary w-100 mt-2 dev-tool add-q-btn" onclick="addNewQuestion('chapter3')" style="display: none;"><i class="fas fa-plus"></i> 在第三章添加新题目</button>
                </div>

                <!-- 章节4 -->
                <div class="mb-5 chapter-container" id="chapter4">
                    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                        <h2 class="h3 mb-0 text-dark fw-bold"><i class="fas fa-rocket me-2 text-primary"></i>4. 暴胀理论</h2>
                    </div>
                    <div class="question-list" data-chapter="4"></div>
                    <button class="btn btn-outline-primary w-100 mt-2 dev-tool add-q-btn" onclick="addNewQuestion('chapter4')" style="display: none;"><i class="fas fa-plus"></i> 在第四章添加新题目</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ======================== 数据层 ============================
        const DEFAULT_DATA = {
            questions: [
                {
                    id: '1_1',
                    chapter: 1,
                    title: '问题1.1 - 哈勃定律推导',
                    desc: '从FRW度规出发，推导哈勃定律 \\( v = H_0 d \\) 的关系。',
                    source: 'Weinberg《宇宙学的物理基础》第一章',
                    ans: '步骤1：FRW度规为：\n\\[ ds^2 = -dt^2 + a^2(t)\\left[\\frac{dr^2}{1-kr^2} + r^2 d\\Omega^2\\right] \\]\n\n步骤2：对于共动距离 \\( \\chi \\)，物理距离为 \\( d = a(t)\\chi \\)\n\n步骤3：哈勃参数定义为 \\( H(t) = \\dot{a}/a \\)\n\n步骤4：速度 \\( v = \\dot{d} = \\dot{a}\\chi = H d \\)，即哈勃定律'
                },
                {
                    id: '1_2',
                    chapter: 1,
                    title: '问题1.2 - 临界密度计算',
                    desc: '计算宇宙的临界密度 \\( \\rho_c \\)，并给出当前观测值的数量级。',
                    source: '俞允强《热大爆炸宇宙学》基础习题',
                    ans: '步骤1：从弗里德曼方程出发：\n\\[ H^2 = \\frac{8\\pi G}{3}\\rho - \\frac{k}{a^2} \\]\n\n步骤2：对于平坦宇宙 \\( k=0 \\)，解得临界密度为：\n\\[ \\rho_c = \\frac{3H^2}{8\\pi G} \\]\n\n步骤3：代入当前观测值哈勃常数，临界密度数量级约为 \\( 10^{-27} \\text{kg/m}^3 \\)'
                },
                {
                    id: '2_1',
                    chapter: 2,
                    title: '问题2.1 - 弗里德曼方程推导',
                    desc: '从爱因斯坦场方程出发，推导包含空间曲率 $k$ 的弗里德曼方程。',
                    source: 'Weinberg《引力论与宇宙学》第十五章',
                    ans: '步骤1：引入理想流体动量张量 $T_{\\mu\\nu} = (\\rho + p)U_\\mu U_\\nu + p g_{\\mu\\nu}$。\n\n步骤2：计算FRW度规下的克里斯托费尔符号与里奇张量。\n\n步骤3：代入场方程，分别由时间分量和空间分量得到经典的两个弗里德曼微分方程。'
                }
            ]
        };

        const STORAGE_KEY = 'cosmos_questions_data';
        let devModeActive = false;

        function loadQuestionsData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (parsed && Array.isArray(parsed.questions)) {
                        return parsed;
                    }
                } catch (e) {}
            }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_DATA));
            return JSON.parse(JSON.stringify(DEFAULT_DATA));
        }

        function saveQuestionsData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        let questionsData = loadQuestionsData();

        // ======================== 渲染引擎 ============================
        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function parseTextToHTML(text, type) {
            const trimmed = text.trim();
            if (type === 'title') return trimmed;
            if (type === 'source') {
                if (!trimmed) return '';
                return `<div class="alert alert-info mt-2 mb-0"><i class="fas fa-book me-2"></i>来源: ${trimmed}</div>`;
            }
            const blocks = trimmed.split(/\n\s*\n/);
            let finalHTML = '';
            blocks.forEach(block => {
                if (!block.trim()) return;
                const formattedBlock = block.replace(/\n/g, '<br>');
                if (type === 'desc') {
                    finalHTML += `<p>${formattedBlock}</p>`;
                } else if (type === 'ans') {
                    finalHTML += `<div class="solution-step"><p>${formattedBlock}</p></div>`;
                }
            });
            return finalHTML || trimmed;
        }

        function renderChapter(chapterNum) {
            const container = document.querySelector(`.chapter-container#chapter${chapterNum} .question-list`);
            if (!container) return;
            const chapterQuestions = questionsData.questions.filter(q => q.chapter === chapterNum);
            chapterQuestions.sort((a, b) => a.id.localeCompare(b.id));
            
            let html = '';
            chapterQuestions.forEach(q => {
                const uid = q.id;
                const titleHtml = parseTextToHTML(q.title, 'title');
                const descHtml = parseTextToHTML(q.desc, 'desc');
                const sourceHtml = parseTextToHTML(q.source, 'source');
                const ansHtml = parseTextToHTML(q.ans, 'ans');

                html += `
                <div class="card mb-4 editable-card" id="q_${uid}">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <h4 class="problem-title mb-0 fw-bold editable-content" id="title_${uid}" data-type="title" data-raw="${escapeHtml(q.title)}">${titleHtml}</h4>
                            <div>
                                <button class="btn btn-sm btn-outline-danger dev-tool dev-edit-btn" onclick="toggleEdit('title_${uid}')"><i class="fas fa-edit"></i> 编辑</button>
                                <button class="btn btn-sm btn-outline-danger dev-tool dev-delete-btn" onclick="deleteQuestion('${uid}')"><i class="fas fa-trash"></i> 删除</button>
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="fw-bold mb-0 text-secondary"><i class="fas fa-question-circle me-2"></i>题目描述</h5>
                                <button class="btn btn-sm btn-outline-danger dev-tool dev-edit-btn" onclick="toggleEdit('desc_${uid}')"><i class="fas fa-edit"></i> 编辑</button>
                            </div>
                            <div class="editable-content" id="desc_${uid}" data-type="desc" data-raw="${escapeHtml(q.desc)}">${descHtml}</div>
                        </div>

                        <div class="mb-4">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="fw-bold mb-0 text-secondary"><i class="fas fa-book me-2"></i>来源出处</h5>
                                <button class="btn btn-sm btn-outline-danger dev-tool dev-edit-btn" onclick="toggleEdit('source_${uid}')"><i class="fas fa-edit"></i> 编辑</button>
                            </div>
                            <div class="editable-content" id="source_${uid}" data-type="source" data-raw="${escapeHtml(q.source)}">${sourceHtml}</div>
                        </div>

                        <div class="mb-2">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="fw-bold mb-0 text-secondary"><i class="fas fa-lightbulb me-2"></i>解答</h5>
                                <button class="btn btn-sm btn-outline-danger dev-tool dev-edit-btn" onclick="toggleEdit('ans_${uid}')"><i class="fas fa-edit"></i> 编辑</button>
                            </div>
                            <div class="editable-content" id="ans_${uid}" data-type="ans" data-raw="${escapeHtml(q.ans)}">${ansHtml}</div>
                        </div>
                    </div>
                </div>
                `;
            });
            container.innerHTML = html;

            document.querySelectorAll('.dev-tool').forEach(el => {
                el.style.display = devModeActive ? 'inline-block' : 'none';
            });

            if (window.MathJax && container.querySelectorAll('.editable-content').length) {
                MathJax.typesetPromise([container]).catch(err => console.error('MathJax渲染错误', err));
            }
        }

        function renderAll() {
            renderChapter(1);
            renderChapter(2);
            renderChapter(3);
            renderChapter(4);
            document.getElementById('devModeSwitch').checked = devModeActive;
            document.querySelectorAll('.dev-tool').forEach(el => {
                el.style.display = devModeActive ? 'inline-block' : 'none';
            });
        }

        // ======================== 编辑与删除 ============================
        function toggleEdit(elementId) {
            if (!devModeActive) return;
            const contentDiv = document.getElementById(elementId);
            if (!contentDiv) return;
            const btn = contentDiv.parentElement.querySelector('.dev-edit-btn') || 
                        contentDiv.previousElementSibling?.querySelector('.dev-edit-btn');
            const type = contentDiv.getAttribute('data-type');
            const raw = contentDiv.getAttribute('data-raw') || '';

            if (contentDiv.tagName.toLowerCase() !== 'textarea') {
                const textarea = document.createElement('textarea');
                textarea.id = elementId;
                textarea.className = 'form-control editable-content mb-2';
                textarea.setAttribute('data-type', type);
                textarea.rows = (type === 'title' || type === 'source') ? 2 : 8;
                textarea.value = raw;
                contentDiv.replaceWith(textarea);
                if (btn) {
                    btn.innerHTML = '<i class="fas fa-save"></i> 保存';
                    btn.classList.remove('btn-outline-danger');
                    btn.classList.add('btn-success');
                }
            } else {
                const currentText = contentDiv.value;
                const id = elementId.split('_').slice(1).join('_');
                const typeKey = elementId.split('_')[0];
                const q = questionsData.questions.find(q => q.id === id);
                if (q) {
                    if (typeKey === 'title') q.title = currentText;
                    else if (typeKey === 'desc') q.desc = currentText;
                    else if (typeKey === 'source') q.source = currentText;
                    else if (typeKey === 'ans') q.ans = currentText;
                    saveQuestionsData(questionsData);
                }
                const newDiv = document.createElement('div');
                newDiv.id = elementId;
                newDiv.className = 'editable-content';
                newDiv.setAttribute('data-type', type);
                newDiv.setAttribute('data-raw', currentText);
                if (type === 'title') newDiv.classList.add('problem-title', 'mb-4', 'fw-bold');
                newDiv.innerHTML = parseTextToHTML(currentText, type);
                contentDiv.replaceWith(newDiv);
                if (btn) {
                    btn.innerHTML = '<i class="fas fa-edit"></i> 编辑';
                    btn.classList.remove('btn-success');
                    btn.classList.add('btn-outline-danger');
                }
                if (window.MathJax) {
                    MathJax.typesetPromise([newDiv]).catch(err => console.error('MathJax渲染错误', err));
                }
            }
        }

        function deleteQuestion(uid) {
            if (!devModeActive) return;
            if (!confirm(`确定要删除题目 "${uid}" 吗？此操作不可撤销。`)) return;
            questionsData.questions = questionsData.questions.filter(q => q.id !== uid);
            saveQuestionsData(questionsData);
            renderAll();
        }

        function addNewQuestion(chapterId) {
            if (!devModeActive) return;
            const chapterNum = parseInt(chapterId.replace('chapter', ''));
            const maxId = questionsData.questions
                .filter(q => q.chapter === chapterNum)
                .reduce((max, q) => {
                    const num = parseInt(q.id.split('_')[1]);
                    return num > max ? num : max;
                }, 0);
            const newId = `${chapterNum}_${maxId + 1}`;
            
            const newQ = {
                id: newId,
                chapter: chapterNum,
                title: '新题目名称',
                desc: '请在此直接输入题目文本及 LaTeX 公式，双换行（留一个空行）可以分段。',
                source: '未指定参考书籍',
                ans: '步骤1：输入内容。\n\n步骤2：空行后输入第二步公式：\\[ \\nabla \\cdot \\mathbf{E} = 0 \\]'
            };
            questionsData.questions.push(newQ);
            saveQuestionsData(questionsData);
            renderAll();
        }

        // ======================== 开发者认证 ============================
        // 密码可见性切换
        let passwordVisible = false;
        function togglePasswordVisibility() {
            const pwdInput = document.getElementById('devPassword');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordVisible) {
                pwdInput.type = 'password';
                eyeIcon.className = 'fas fa-eye';
                passwordVisible = false;
            } else {
                pwdInput.type = 'text';
                eyeIcon.className = 'fas fa-eye-slash';
                passwordVisible = true;
            }
        }

        function openDevAuth() {
            document.getElementById('devAuthOverlay').classList.add('active');
            document.getElementById('authError').style.display = 'none';
            // 清空输入框，不预填
            document.getElementById('devAccount').value = '';
            document.getElementById('devPassword').value = '';
            // 确保密码是隐藏状态
            if (passwordVisible) {
                togglePasswordVisibility();
            }
            // 自动聚焦到账号框
            setTimeout(() => document.getElementById('devAccount').focus(), 100);
        }

        function closeDevAuth() {
            document.getElementById('devAuthOverlay').classList.remove('active');
            if (!devModeActive) {
                document.getElementById('devModeSwitch').checked = false;
            }
        }

        function verifyDevAuth() {
            const account = document.getElementById('devAccount').value.trim();
            const password = document.getElementById('devPassword').value.trim();
            if (account === '2511392' && password === 'Jby021009') {
                devModeActive = true;
                document.getElementById('devAuthOverlay').classList.remove('active');
                document.getElementById('devModeSwitch').checked = true;
                document.querySelectorAll('.dev-tool').forEach(el => {
                    el.style.display = 'inline-block';
                });
                sessionStorage.setItem('dev_authenticated', 'true');
                // 清空密码框
                document.getElementById('devPassword').value = '';
            } else {
                document.getElementById('authError').style.display = 'block';
                document.getElementById('devPassword').value = '';
                document.getElementById('devPassword').focus();
            }
        }

        // 回车键触发验证
        document.getElementById('devPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                verifyDevAuth();
            }
        });
        document.getElementById('devAccount').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('devPassword').focus();
            }
        });

        document.getElementById('devAuthOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDevAuth();
            }
        });

        // ======================== 开发者模式开关 ============================
        document.getElementById('devModeSwitch').addEventListener('change', function(e) {
            if (e.target.checked) {
                if (devModeActive) {
                    document.querySelectorAll('.dev-tool').forEach(el => {
                        el.style.display = 'inline-block';
                    });
                    return;
                }
                openDevAuth();
                if (!devModeActive) {
                    this.checked = false;
                }
            } else {
                devModeActive = false;
                document.querySelectorAll('.dev-tool').forEach(el => {
                    el.style.display = 'none';
                });
                sessionStorage.removeItem('dev_authenticated');
            }
        });

        // ======================== 搜索与导航 ============================
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase().trim();
            const allCards = document.querySelectorAll('.editable-card');
            allCards.forEach(card => {
                const contentElements = card.querySelectorAll('.editable-content');
                let isMatch = false;
                contentElements.forEach(el => {
                    const text = (el.getAttribute('data-raw') || el.innerText || "").toLowerCase();
                    if (text.includes(keyword)) isMatch = true;
                });
                card.style.display = isMatch ? '' : 'none';
            });
            document.querySelectorAll('.chapter-container').forEach(chapter => {
                const cards = chapter.querySelectorAll('.editable-card');
                let hasVisible = false;
                cards.forEach(c => { if (c.style.display !== 'none') hasVisible = true; });
                chapter.style.display = (keyword !== '' && !hasVisible) ? 'none' : '';
            });
        });

        document.querySelectorAll('#chapterNavbar .list-group-item').forEach(item => {
            item.addEventListener('click', function(e) {
                document.querySelectorAll('#chapterNavbar .list-group-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // ======================== 启动 ============================
        document.addEventListener('DOMContentLoaded', function() {
            if (sessionStorage.getItem('dev_authenticated') === 'true') {
                devModeActive = true;
            }
            renderAll();
            if (devModeActive) {
                document.getElementById('devModeSwitch').checked = true;
                document.querySelectorAll('.dev-tool').forEach(el => {
                    el.style.display = 'inline-block';
                });
            } else {
                document.getElementById('devModeSwitch').checked = false;
                document.querySelectorAll('.dev-tool').forEach(el => {
                    el.style.display = 'none';
                });
            }
        });

        window.toggleEdit = toggleEdit;
        window.addNewQuestion = addNewQuestion;
        window.deleteQuestion = deleteQuestion;
        window.openDevAuth = openDevAuth;
        window.closeDevAuth = closeDevAuth;
        window.verifyDevAuth = verifyDevAuth;
        window.togglePasswordVisibility = togglePasswordVisibility;
    </script>
</body>
</html>
